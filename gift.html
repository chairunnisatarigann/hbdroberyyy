<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Unlocked! - Robbery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .gift-wrapper {
            font-size: 50px; /* Ukuran kado dibuat lebih mantap */
            margin: 20px 0;
            display: inline-block;
            animation: heartbeat 2s ease-in-out infinite;
            cursor: pointer;
        }

        #catVideo {
            display: none;
            width: 180px; /* Video diperbesar karena ruang sudah luas */
            height: auto;
            border-radius: 12px;
            border: 4px solid #ffb3ba;
            margin: 15px 0;
            background: #000;
        }

        .message-screen {
            background: #fff;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="gameboy-container">
        <div class="gb-top">
            <div class="power-light"></div>
            <div class="logo-text">GAME-BOY</div>
        </div>

        <div class="screen-container">
            <div class="message-screen">
                <h3 style="font-family: 'Press Start 2P'; font-size: 10px; color: #ff4d6d; margin-bottom: 5px;">REWARD UNLOCKED</h3>
                
                <div id="giftIcon" class="gift-wrapper" onclick="openGift()">🎁</div>

                <video id="catVideo" loop playsinline>
                    <source src="kicau.webm" type="video/webm">
                </video>
                
                <p style="font-family: 'Press Start 2P'; font-size: 8px; margin-top: 10px; color: #333;">LEVEL UP, ROBBERY!</p>

                <p style="font-size: 8px; line-height: 1.5; margin-top: 15px; color: #666; font-style: italic;">
                    "Click the gift for a surprise sound!"
                </p>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="index.html" class="btn-back">BACK</a>
        </div>
    </div>

    <script>
        function openGift() {
            var gift = document.getElementById("giftIcon");
            var video = document.getElementById("catVideo");
            
            gift.style.display = "none";
            video.style.display = "block";
            video.volume = 1.0; 
            video.play();
        }
    </script>
</body>
</html>
