<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Unlocked! - Robbery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Reset dasar agar tidak berantakan di HP */
        body {
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0; /* Opsional: warna latar belakang luar */
        }

        /* Container GameBoy dibuat maksimal lebar layar HP */
        .gameboy-container {
            width: 100%;
            max-width: 350px; /* Lebar standar GameBoy di layar */
            margin: 0 auto;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .gift-wrapper {
            font-size: 60px; 
            margin: 20px 0;
            display: inline-block;
            animation: heartbeat 2s ease-in-out infinite;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Hilangkan highlight biru saat klik di HP */
        }

        #catVideo {
            display: none;
            width: 90%; /* Video menyesuaikan lebar container */
            max-width: 200px;
            height: auto;
            border-radius: 12px;
            border: 4px solid #ffb3ba;
            margin: 10px 0;
            background: #000;
        }

        .message-screen {
            background: #fff;
            min-height: 250px; /* Gunakan min-height agar bisa membesar jika perlu */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            border-radius: 5px;
            box-sizing: border-box; /* Penting agar padding tidak merusak ukuran */
        }

        /* Responsive Text */
        .title-text {
            font-family: 'Press Start 2P';
            font-size: 10px;
            color: #ff4d6d;
            margin-bottom: 5px;
        }

        .sub-text {
            font-family: 'Press Start 2P';
            font-size: 8px;
            margin-top: 10px;
            color: #333;
        }

        .instruction {
            font-size: 9px;
            line-height: 1.5;
            margin-top: 15px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="gameboy-container">
        <div class="gb-top">
            <div class="power-light"></div>
            <div class="logo-text">GAME-BOY</div>
        </div>

        <div class="screen-container">
            <div class="message-screen">
                <h3 class="title-text">REWARD UNLOCKED</h3>
                
                <div id="giftIcon" class="gift-wrapper" onclick="openGift()">🎁</div>

                <video id="catVideo" loop playsinline>
                    <source src="kicau.webm" type="video/webm">
                </video>
                
                <p class="sub-text">LEVEL UP, ROBBERY!</p>

                <p id="instructionText" class="instruction">
                    "Click the gift for a surprise!"
                </p>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="index.html" class="btn-back">BACK</a>
        </div>
    </div>

    <script>
        function openGift() {
            var gift = document.getElementById("giftIcon");
            var video = document.getElementById("catVideo");
            var instruction = document.getElementById("instructionText");
            
            gift.style.display = "none";
            video.style.display = "block";
            instruction.style.display = "none"; // Hilangkan instruksi setelah diklik
            
            video.muted = false; // Memastikan suara menyala
            video.volume = 1.0; 
            
            // Play video dengan penanganan error (sering terjadi di HP karena kebijakan privasi)
            var playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Autoplay dicegah oleh browser, butuh interaksi user.");
                });
            }
        }
    </script>
</body>
</html>
