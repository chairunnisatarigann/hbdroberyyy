<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Unlocked! - Robbery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fbc2eb;
        }

        /* CONTAINER LEBAR KONSISTEN (550px) */
        .gameboy-container {
            width: 95%;
            max-width: 550px; 
            background: #3d4e56;
            padding: 30px;
            border-radius: 20px 20px 60px 20px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.2);
        }

        .screen-container {
            background: #2d3133;
            padding: 15px;
            border-radius: 10px;
            border: 4px solid #222;
        }

        .message-screen {
            background: #ffffff;
            height: 420px; /* Tinggi disamakan dengan Music/Gallery */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Konten di tengah */
            padding: 25px;
            box-sizing: border-box;
            border-radius: 5px;
            text-align: center;
        }

        /* JUDUL REWARD */
        .title-text {
            font-family: 'Press Start 2P';
            font-size: 16px;
            color: #ff4d6d;
            margin-bottom: 20px;
        }

        /* KADO RAKSASA */
        .gift-wrapper {
            font-size: 120px; /* Diperbesar drastis */
            margin: 20px 0;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.3s;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* VIDEO MONITOR BESAR */
        #catVideo {
            display: none;
            width: 100%; 
            max-width: 350px; /* Lebih lebar dari sebelumnya */
            height: auto;
            border-radius: 15px;
            border: 6px solid #ffb3ba;
            margin: 10px 0;
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .sub-text {
            font-family: 'Press Start 2P';
            font-size: 11px;
            margin-top: 20px;
            color: #333;
        }

        .instruction {
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            margin-top: 15px;
            color: #888;
            font-style: italic;
            font-weight: 500;
        }

        .back-btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .btn-back {
            display: inline-block;
            padding: 15px 40px;
            font-size: 12px;
            font-family: 'Press Start 2P';
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 5px 0 #000;
        }

        .btn-back:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #000;
        }
    </style>
</head>
<body>
    <div class="gameboy-container">
        <div class="gb-top">
            <div style="width: 12px; height: 12px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 8px #ff0000; margin-right: 15px; display: inline-block;"></div>
            <span style="color: #999; font-family: 'Press Start 2P'; font-size: 12px; letter-spacing: 2px;">GAME-BOY</span>
        </div>

        <div class="screen-container">
            <div class="message-screen">
                <h3 class="title-text">REWARD UNLOCKED</h3>
                
                <div id="giftIcon" class="gift-wrapper" onclick="openGift()">🎁</div>

                <video id="catVideo" loop playsinline preload="auto">
                    <source src="kicau.mp4" type="video/mp4">
                    <source src="kicau.webm" type="video/webm">
                </video>
                
                <p class="sub-text">LEVEL UP, ROBBERY!</p>

                <p id="instructionText" class="instruction">
                    "Tap the gift for a surprise!"
                </p>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="index.html" class="btn-back">BACK</a>
        </div>
    </div>

    <script>
        function openGift() {
            var gift = document.getElementById("giftIcon");
            var video = document.getElementById("catVideo");
            var instruction = document.getElementById("instructionText");
            
            gift.style.display = "none";
            video.style.display = "block";
            if(instruction) instruction.style.display = "none";
            
            video.muted = false; 
            video.volume = 1.0; 
            
            // Force load untuk memastikan video MP4 siap diputar
            video.load();
            var playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    console.log("Playback started!");
                }).catch(error => {
                    console.log("Autoplay blocked, playing muted.");
                    video.muted = true;
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
