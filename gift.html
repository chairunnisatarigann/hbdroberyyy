<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Unlocked! - Robbery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a; /* Background gelap biar GameBoy stand out */
        }

        .gameboy-container {
            width: 350px; 
            margin: 0 auto;
            /* Pastikan class di style.css tidak menimpa display ini */
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .gift-wrapper {
            font-size: 70px; 
            margin: 20px 0;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
            cursor: pointer;
            transition: 0.2s;
        }

        .gift-wrapper:hover {
            filter: drop-shadow(0 0 10px #ff4d6d);
        }

        #catVideo {
            display: none;
            width: 220px; 
            height: auto;
            border-radius: 8px;
            border: 4px solid #ffb3ba;
            margin: 10px 0;
            background: #000;
        }

        .message-screen {
            background: #fff;
            height: 300px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            border-radius: 5px;
            box-sizing: border-box;
            border: 4px solid #333;
        }

        .title-text {
            font-family: 'Press Start 2P';
            font-size: 11px;
            color: #ff4d6d;
            margin-bottom: 10px;
        }

        .sub-text {
            font-family: 'Press Start 2P';
            font-size: 9px;
            margin-top: 15px;
            color: #333;
        }

        .instruction {
            font-size: 10px;
            font-family: Arial, sans-serif;
            margin-top: 10px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="gameboy-container">
        <div class="gb-top">
            <div class="power-light"></div>
            <div class="logo-text">GAME-BOY</div>
        </div>

        <div class="screen-container">
            <div class="message-screen">
                <h3 class="title-text">REWARD UNLOCKED</h3>
                
                <div id="giftIcon" class="gift-wrapper" onclick="openGift()">🎁</div>

                <video id="catVideo" loop playsinline preload="auto">
                    <source src="kicau.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                
                <p class="sub-text">LEVEL UP, ROBBERY!</p>

                <p id="instructionText" class="instruction">
                    "Click the gift for a surprise!"
                </p>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="index.html" class="btn-back">BACK</a>
        </div>
    </div>

    <script>
        function openGift() {
            var gift = document.getElementById("giftIcon");
            var video = document.getElementById("catVideo");
            var instruction = document.getElementById("instructionText");
            
            // 1. Sembunyikan Kado & Teks instruksi
            gift.style.display = "none";
            if(instruction) instruction.style.display = "none";
            
            // 2. Tampilkan Video
            video.style.display = "block";
            
            // 3. Pengaturan Audio
            video.muted = false; 
            video.volume = 1.0; 
            
            // 4. Load dan Putar (Kunci agar MP4 jalan di Laptop)
            video.load(); 
            var playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.then(function() {
                    console.log("Video playing successfully");
                }).catch(function(error) {
                    console.log("Playback failed: " + error);
                    // Fail-safe: Jika gagal bersuara, putar tanpa suara
                    video.muted = true;
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
