<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift - Robbery</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #fbc2eb; }
        .gameboy-container { width: 95%; max-width: 550px; background: #3d4e56; padding: 30px; border-radius: 20px 20px 60px 20px; }
        .screen-container { background: #2d3133; padding: 15px; border-radius: 10px; }
        .message-screen { background: white; height: 420px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; box-sizing: border-box; border-radius: 5px; text-align: center; }
        .gift-wrapper { font-size: 130px; cursor: pointer; animation: heartbeat 1.5s infinite; -webkit-tap-highlight-color: transparent; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #catVideo { display: none; width: 100%; max-width: 380px; height: auto; border-radius: 15px; border: 6px solid #ffb3ba; background: #000; }
        .btn-back { display: block; text-align: center; margin-top: 25px; padding: 15px; background: #222; color: white; text-decoration: none; font-family: 'Press Start 2P'; font-size: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="gameboy-container">
        <div class="screen-container">
            <div class="message-screen">
                <h3 style="font-family:'Press Start 2P'; font-size:14px; color:#ff4d6d; margin-bottom:20px;">GIFT FOR YOU</h3>
                <div id="giftIcon" class="gift-wrapper" onclick="openGift()">🎁</div>
                <video id="catVideo" loop playsinline webkit-playsinline preload="auto">
                    <source src="kicau.mp4" type="video/mp4">
                </video>
                <p id="instructionText" style="font-family: Arial; color:#888; margin-top:20px;">"Click the gift!"</p>
            </div>
        </div>
        <a href="index.html" class="btn-back">BACK</a>
    </div>

    <script>
        function openGift() {
            const gift = document.getElementById("giftIcon");
            const video = document.getElementById("catVideo");
            const instruction = document.getElementById("instructionText");

            gift.style.display = "none";
            instruction.style.display = "none";
            video.style.display = "block";

            // TRIK KHUSUS HP: Muted dulu baru play, lalu unmute
            video.muted = true;
            video.load();
            video.play().then(() => {
                setTimeout(() => {
                    video.muted = false;
                    video.volume = 1.0;
                }, 100);
            }).catch(err => {
                console.log("Mencoba play tanpa suara...");
                video.muted = true;
                video.play();
            });
        }
    </script>
</body>
</html>
