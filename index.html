<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎁</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="ultahLagu" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-happybirthday.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="card" id="giftCard">
            <div class="gift-icon" onclick="bukaKado()">🎁</div>
            <h2 id="instruksi">Klik kadonya ada sesuatu!</h2>
            
            <div id="kontenIsi" class="hidden">
                <h1 class="title">Happy Birthday! 🎂</h1>
                <p class="message">"Selamat ulang tahun! Ini adalah hadiah kecil buat kamu. Semoga harimu menyenangkan dan penuh tawa!"</p>
                <p class="footer">- Dari Temanmu -</p>
            </div>
        </div>
    </div>

    <script>
        function bukaKado() {
            // Putar Lagu
            var lagu = document.getElementById("ultahLagu");
            lagu.play();

            // Sembunyikan ikon kado & instruksi
            document.querySelector('.gift-icon').style.display = 'none';
            document.getElementById('instruksi').style.display = 'none';

            // Munculkan isi ucapan
            document.getElementById('kontenIsi').classList.remove('hidden');
            
            // Tambahkan efek konfeti (opsional jika mau tambah library nanti)
            document.getElementById('giftCard').style.transform = 'scale(1.1)';
        }
    </script>
</body>
</html>
