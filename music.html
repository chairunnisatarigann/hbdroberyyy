<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player - Robbery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fbc2eb;
        }

        /* CONTAINER LEBAR KONSISTEN */
        .gameboy-container {
            width: 95%;
            max-width: 550px; 
            background: #3d4e56;
            padding: 30px;
            border-radius: 20px 20px 60px 20px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.2);
        }

        .screen-container {
            background: #2d3133;
            padding: 15px;
            border-radius: 10px;
            border: 4px solid #222;
        }

        .message-screen {
            background: #ffffff;
            height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Tombol jadi center di tengah layar */
            padding: 25px;
            box-sizing: border-box;
            border-radius: 5px;
            text-align: center;
        }

        .music-title {
            font-family: 'Press Start 2P';
            font-size: 14px;
            color: #ff4d6d;
            margin-bottom: 30px;
            width: 100%;
        }

        .status-text {
            font-family: 'Press Start 2P';
            font-size: 10px;
            margin-bottom: 25px;
            color: #333;
        }

        /* TOMBOL MUSIC RAKSASA */
        .play-btn {
            width: 140px;
            height: 140px;
            background: #ff4d6d;
            border: 8px solid #333;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 0 #c93652, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.1s;
            position: relative;
            outline: none;
        }

        .play-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #c93652;
        }

        /* Ikon Play/Pause dalam tombol */
        .play-btn span {
            font-family: 'Press Start 2P';
            font-size: 14px;
            color: white;
            text-shadow: 2px 2px #c93652;
        }

        .music-desc {
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            margin-top: 40px;
            color: #666;
            line-height: 1.6;
            padding: 0 10px;
        }

        .song-name {
            color: #ff4d6d;
            font-weight: 600;
            display: block;
            margin-top: 10px;
            font-family: 'Press Start 2P';
            font-size: 9px;
        }

        .back-btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .btn-back {
            display: inline-block;
            padding: 15px 40px;
            font-size: 12px;
            font-family: 'Press Start 2P';
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 5px 0 #000;
        }
    </style>
</head>
<body>
    <div class="gameboy-container">
        <div class="gb-top">
            <div style="width: 12px; height: 12px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 8px #ff0000; margin-right: 15px; display: inline-block;"></div>
            <span style="color: #999; font-family: 'Press Start 2P'; font-size: 12px; letter-spacing: 2px;">GAME-BOY</span>
        </div>

        <div class="screen-container">
            <div class="message-screen">
                <div class="music-title">MUSIC PLAYER</div>
                
                <p class="status-text">STATUS: <span id="status" style="color:#ff4d6d">PAUSED</span></p>
                
                <button onclick="toggleMusic()" id="btnPlay" class="play-btn">
                    <span id="btnText">PLAY</span>
                </button>

                <audio id="myAudio" loop>
                    <source src="lagu.mp3" type="audio/mpeg">
                </audio>

                <div class="music-desc">
                    Because it's your birthday, I picked an Indonesian song for you:
                    <span class="song-name">"JAMRUD – Selamat Ulang Tahun"</span>
                </div>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="index.html" class="btn-back">BACK</a>
        </div>
    </div>

    <script>
    function toggleMusic() {
        var audio = document.getElementById("myAudio");
        var status = document.getElementById("status");
        var btnText = document.getElementById("btnText");
        
        if (audio.paused) {
            audio.play();
            status.innerHTML = "PLAYING";
            status.style.color = "#4dff8a"; // Berubah hijau saat playing
            btnText.innerHTML = "PAUSE";
        } else {
            audio.pause();
            status.innerHTML = "PAUSED";
            status.style.color = "#ff4d6d";
            btnText.innerHTML = "PLAY";
        }
    }
    </script>
</body>
</html>
